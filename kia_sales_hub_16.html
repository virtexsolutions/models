<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kia Sales Hub</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap');

:root {
  --kia-red: #BB162B;
  --kia-red-dark: #8C1020;
  --kia-red-glow: rgba(187,22,43,0.35);
  --ink: #050D14;
  --ink-90: #0B1820;
  --ink-80: #0F2030;
  --ink-60: #1C3548;
  --ink-40: #2E5068;
  --ink-20: #4A7090;
  --surface: #0A1929;
  --surface-2: #0D2238;
  --surface-3: #122840;
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.07);
  --glass-border-bright: rgba(255,255,255,0.13);
  --text-primary: rgba(255,255,255,0.92);
  --text-secondary: rgba(255,255,255,0.5);
  --text-muted: rgba(255,255,255,0.28);
  --accent-cyan: #00C8FF;
  --accent-cyan-dim: rgba(0,200,255,0.12);
  --gold: #C99A00;
  --gold-dim: rgba(201,154,0,0.15);
  --border: rgba(255,255,255,0.07);
  --border-accent: rgba(0,200,255,0.2);
  --radius: 3px;
  --radius-lg: 6px;
  --shadow: 0 0 0 1px rgba(0,200,255,0.06), 0 8px 32px rgba(0,0,0,0.4);
  --glow-red: 0 0 20px rgba(187,22,43,0.4);
  --glow-cyan: 0 0 20px rgba(0,200,255,0.15);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Inter', sans-serif;
  background: var(--ink);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── SCANLINE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
}

/* ── HEADER ── */
.site-header {
  background: var(--ink-90);
  padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  height: 56px; position: sticky; top: 0; z-index: 200; width: 100%;
  border-bottom: 1px solid var(--glass-border);
  backdrop-filter: blur(12px);
  box-shadow: 0 1px 0 rgba(0,200,255,0.08), 0 4px 20px rgba(0,0,0,0.5);
}
.site-wordmark {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 3px; text-transform: uppercase;
}
.hdr-right {
  font-size: 10px; color: var(--text-muted);
  letter-spacing: 3px; text-transform: uppercase; font-weight: 500;
}

/* ── SCREEN ── */
.screen { width: 100%; position: relative; z-index: 1; }

/* ── KB LAYOUT ── */
#screen-kb { min-height: calc(100vh - 56px); background: var(--ink); }
.kb-layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 56px); }

/* ── SIDEBAR ── */
.kb-sidebar {
  background: var(--ink-90);
  border-right: 1px solid var(--glass-border);
  overflow-y: auto; position: sticky; top: 56px; height: calc(100vh - 56px);
  scrollbar-width: thin; scrollbar-color: rgba(0,200,255,0.15) transparent;
}
.kb-sidebar::-webkit-scrollbar { width: 3px; }
.kb-sidebar::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.15); border-radius: 2px; }

.kb-sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--glass-border);
}
.kb-sidebar-title {
  font-size: 9px; font-weight: 600; letter-spacing: 3px;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 14px;
}
.kb-tab-row { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.kb-tab-btn {
  padding: 8px 0; border: 1px solid var(--glass-border-bright);
  border-radius: var(--radius); background: transparent;
  color: var(--text-muted); font-size: 10px; font-weight: 600;
  letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.kb-tab-btn.active {
  background: var(--kia-red); border-color: var(--kia-red);
  color: white; box-shadow: var(--glow-red);
}
.kb-tab-btn:hover:not(.active) { background: var(--glass); color: var(--text-primary); }

.kb-cat {
  padding: 18px 18px 5px;
  font-size: 9px; font-weight: 700; letter-spacing: 3px;
  text-transform: uppercase; color: var(--kia-red);
  opacity: 0.7;
}
.kb-model-btn {
  width: 100%; padding: 9px 18px;
  background: transparent; border: none; border-left: 2px solid transparent;
  text-align: left; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all 0.12s;
  display: flex; align-items: center; justify-content: space-between;
  position: relative;
}
.kb-model-btn::after {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0; width: 0;
  background: linear-gradient(to left, rgba(0,200,255,0.04), transparent);
  transition: width 0.2s;
}
.kb-model-btn:hover::after { width: 100%; }
.kb-model-btn:hover { border-left-color: rgba(0,200,255,0.3); }
.kb-model-btn.active {
  background: rgba(187,22,43,0.1);
  border-left-color: var(--kia-red);
  box-shadow: inset 0 0 20px rgba(187,22,43,0.05);
}
.kb-model-name { font-size: 13px; font-weight: 600; color: var(--text-primary); line-height: 1.2; }
.kb-model-sub { font-size: 10px; color: var(--text-muted); margin-top: 2px; letter-spacing: 0.3px; }

/* ── SEARCH INPUT IN SIDEBAR ── */
.kb-search-wrap { padding: 16px 18px; }
.kb-search-wrap input {
  width: 100%; padding: 9px 12px;
  border: 1px solid var(--glass-border-bright);
  border-radius: var(--radius); background: var(--glass);
  color: var(--text-primary); font-size: 13px;
  font-family: 'Inter', sans-serif; outline: none; transition: all 0.15s;
}
.kb-search-wrap input::placeholder { color: var(--text-muted); }
.kb-search-wrap input:focus {
  border-color: var(--kia-red);
  box-shadow: 0 0 0 2px var(--kia-red-glow);
  background: rgba(187,22,43,0.04);
}
.kb-search-hint { font-size: 9px; color: var(--text-muted); margin-top: 8px; letter-spacing: 0.5px; line-height: 1.6; }

/* ── CONTENT AREA ── */
.kb-content { padding: 40px 48px; overflow-y: auto; max-width: 1100px; }

/* ── WELCOME ── */
.kb-welcome { display: flex; align-items: center; justify-content: center; height: 65vh; text-align: center; }
.kb-welcome-inner { max-width: 420px; }
.kb-welcome-mark { width: 40px; height: 2px; background: var(--kia-red); margin: 0 auto 28px; box-shadow: var(--glow-red); }
.kb-welcome h2 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px; font-weight: 700; color: var(--text-primary);
  margin-bottom: 12px; letter-spacing: 2px; text-transform: uppercase;
}
.kb-welcome p { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }

/* ── MODEL HEADER ── */
.kb-model-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 46px; font-weight: 700; color: var(--text-primary);
  line-height: 1; margin-bottom: 6px;
  letter-spacing: 1px; text-transform: uppercase;
}
.kb-model-tagline { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; line-height: 1.6; }
.kb-meta-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.kb-meta-pill {
  padding: 5px 12px; border-radius: var(--radius);
  font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase;
  background: var(--glass); color: var(--text-secondary);
  border: 1px solid var(--glass-border-bright);
}
.kb-meta-pill.hl {
  background: var(--kia-red); color: white; border-color: var(--kia-red);
  box-shadow: var(--glow-red);
}
.overview-box {
  background: var(--surface-2);
  border-radius: var(--radius-lg); padding: 16px 20px;
  font-size: 13px; color: var(--text-secondary); line-height: 1.8;
  margin-bottom: 28px; border-left: 2px solid var(--kia-red);
  border: 1px solid var(--glass-border);
  border-left: 2px solid var(--kia-red);
  box-shadow: var(--shadow);
}
.new-tag {
  display: inline-block; background: var(--kia-red); color: white;
  font-size: 9px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 2px; margin-left: 10px;
  vertical-align: middle; position: relative; top: -3px;
  box-shadow: var(--glow-red);
}

/* ── TRIM TABS ── */
.trim-tabs {
  display: flex; border-bottom: 1px solid var(--glass-border);
  margin-bottom: 24px; overflow-x: auto; gap: 0;
}
.trim-tab {
  padding: 11px 20px; border: none; background: transparent;
  font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
  color: var(--text-muted); cursor: pointer;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  white-space: nowrap; transition: all 0.12s; flex-shrink: 0;
  letter-spacing: 1.5px; text-transform: uppercase;
}
.trim-tab:hover { color: var(--text-primary); }
.trim-tab.active { color: var(--kia-red); border-bottom-color: var(--kia-red); }

/* ── TRIM CONTENT ── */
.trim-content { display: none; }
.trim-content.active { display: block; }
.trim-top { margin-bottom: 22px; }
.trim-name-big {
  font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700;
  color: var(--text-primary); text-transform: uppercase; letter-spacing: 1px;
}
.trim-tagline { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
.trim-price { font-size: 15px; font-weight: 700; color: var(--kia-red); margin-top: 6px; letter-spacing: 0.5px; }
.trim-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }

/* ── CARDS ── */
.trim-card {
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 20px;
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
.trim-card:hover { border-color: var(--glass-border-bright); }
.trim-card-title {
  font-size: 9px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}
.trim-card-title::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }

/* ── SELLING POINTS ── */
.selling-points { list-style: none; padding: 0; }
.selling-points li {
  padding: 8px 0; border-bottom: 1px solid var(--glass-border);
  font-size: 13px; color: var(--text-secondary); line-height: 1.5;
  display: flex; gap: 10px; align-items: flex-start;
}
.selling-points li:last-child { border-bottom: none; }
.selling-points li::before {
  content: ''; display: block; width: 3px; height: 3px;
  border-radius: 50%; background: var(--accent-cyan);
  flex-shrink: 0; margin-top: 7px;
  box-shadow: 0 0 6px var(--accent-cyan);
}
.selling-points li.upgrade {
  background: var(--gold-dim) !important;
  border-radius: var(--radius) !important;
  padding: 10px 12px !important;
  border-bottom: none !important;
  margin-bottom: 5px;
  border: 1px solid rgba(201,154,0,0.3) !important;
}
.selling-points li.upgrade::before { display: none; }
.upgrade-label {
  display: inline-flex; align-items: center;
  background: var(--gold); color: var(--ink);
  font-size: 8px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 2px; margin-right: 10px;
  flex-shrink: 0; white-space: nowrap;
  box-shadow: 0 0 10px rgba(201,154,0,0.4);
}
.selling-points li.upgrade span { color: var(--text-primary); font-size: 13px; line-height: 1.5; }

/* Feature highlight rows */
.selling-points li.feat-highlight {
  background: rgba(255,255,255,0.03) !important;
  border-radius: var(--radius) !important;
  padding: 9px 12px !important;
  border-bottom: none !important;
  margin-bottom: 4px;
  border: 1px solid rgba(255,255,255,0.08) !important;
  display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap;
}
.selling-points li.feat-highlight::before { display: none; }
.selling-points li.feat-highlight span { color: var(--text-secondary); font-size: 13px; line-height: 1.5; flex: 1; min-width: 0; }

/* Feature tags — inline pill badges */
.feat-tag {
  display: inline-flex; align-items: center;
  font-size: 9px; font-weight: 800; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 2px 7px; border-radius: 2px;
  flex-shrink: 0; white-space: nowrap; align-self: flex-start; margin-top: 2px;
}
.ft-leather { background: rgba(160,100,40,0.2); color: #D4924A; border: 1px solid rgba(160,100,0,0.35); }
.ft-sunroof { background: rgba(0,180,255,0.12); color: var(--accent-cyan); border: 1px solid rgba(0,180,255,0.28); }
.ft-hev     { background: rgba(40,180,80,0.12); color: #4DCB7A; border: 1px solid rgba(40,180,80,0.3); }
.ft-phev    { background: rgba(120,80,255,0.12); color: #A07EFF; border: 1px solid rgba(120,80,255,0.3); }

/* NEW badge on upgrade rows that also have feature tags */
.selling-points li.upgrade .feat-tag { margin-top: 2px; }

/* ── MSRP CARD ── */
.trim-price-big {
  font-family: 'Rajdhani', sans-serif; font-size: 40px; font-weight: 700;
  color: var(--text-primary); letter-spacing: 0.5px;
}
.trim-price-note { font-size: 11px; color: var(--text-muted); margin-top: 5px; letter-spacing: 0.3px; }

/* ── TALK TRACK ── */
.talk-track {
  background: var(--ink-80);
  border-radius: var(--radius);
  padding: 16px 18px; margin-top: 16px;
  border: 1px solid var(--glass-border);
  border-left: 2px solid var(--kia-red);
  box-shadow: var(--shadow), inset 0 0 30px rgba(187,22,43,0.03);
}
.talk-label {
  font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: var(--kia-red); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.talk-label::after { content: ''; flex: 1; height: 1px; background: rgba(187,22,43,0.25); }
.talk-track p { font-size: 13px; color: var(--text-secondary); line-height: 1.75; }

/* ── OBJECTIONS ── */
.objections-section {
  background: var(--surface);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 24px; margin-top: 24px;
  box-shadow: var(--shadow);
}
.obj-header {
  font-size: 9px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: 18px;
  display: flex; align-items: center; gap: 8px;
}
.obj-header::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }
.obj-item { padding: 16px 0; border-bottom: 1px solid var(--glass-border); }
.obj-item:last-child { border-bottom: none; }
.obj-q {
  font-size: 13px; font-weight: 600; color: var(--text-primary);
  margin-bottom: 8px; padding-left: 14px;
  border-left: 2px solid var(--kia-red);
  line-height: 1.5;
}
.obj-a { font-size: 13px; color: var(--text-secondary); line-height: 1.75; padding-left: 14px; margin-top: 6px; }

/* ── SECTION DIVIDER LINE (decorative) ── */
.model-divider {
  height: 1px; background: linear-gradient(to right, var(--kia-red), rgba(0,200,255,0.3), transparent);
  margin-bottom: 28px; box-shadow: 0 0 8px rgba(187,22,43,0.3);
}

/* ── SEARCH RESULTS ── */
.search-results-header { margin-bottom: 24px; }
.search-results-title {
  font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700;
  color: var(--text-primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;
}
.search-results-meta { font-size: 12px; color: var(--text-secondary); }
.search-model-card {
  background: var(--surface); border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg); padding: 20px; margin-bottom: 12px;
  box-shadow: var(--shadow); transition: border-color 0.15s;
}
.search-model-card:hover { border-color: var(--glass-border-bright); }
.search-model-name {
  font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700;
  color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.5px;
}
.search-card-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--glass-border);
}
.search-view-btn {
  padding: 6px 14px; border: 1px solid var(--kia-red);
  border-radius: var(--radius); background: transparent;
  color: var(--kia-red); font-size: 10px; font-weight: 600;
  letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all 0.15s;
}
.search-view-btn:hover { background: var(--kia-red); color: white; box-shadow: var(--glow-red); }
.search-trim-row {
  display: flex; align-items: flex-start; gap: 16px;
  padding: 10px 0; border-bottom: 1px solid var(--glass-border);
}
.search-trim-row:last-child { border-bottom: none; }
.search-trim-name { font-size: 13px; font-weight: 600; color: var(--text-primary); min-width: 140px; flex-shrink: 0; }
.search-trim-price { font-size: 11px; color: var(--kia-red); font-weight: 700; margin-top: 3px; }
.search-trim-note { font-size: 13px; color: var(--text-secondary); line-height: 1.6; flex: 1; }
.search-empty { text-align: center; padding: 80px 20px; }
.search-empty-line { width: 32px; height: 2px; background: var(--kia-red); margin: 0 auto 28px; box-shadow: var(--glow-red); }
.search-empty-title {
  font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700;
  color: var(--text-primary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
}
.search-empty-sub { font-size: 13px; color: var(--text-secondary); line-height: 1.8; }

/* ── SCROLLBAR (content area) ── */
.kb-content::-webkit-scrollbar { width: 4px; }
.kb-content::-webkit-scrollbar-track { background: transparent; }
.kb-content::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.12); border-radius: 2px; }

/* ── PRINT ── */
@media print {
  .site-header, .kb-sidebar { display: none !important; }
  body { background: white; color: black; }
  .kb-content { padding: 0; max-width: 100%; }
}

<body>
<header class="site-header">
  <div class="site-wordmark">2026 / 2027 Sales Hub</div>
  <div class="hdr-right" id="hdr-right">Knowledge Base</div>
</header>

<!-- HOME SCREEN -->
<!-- KNOWLEDGE BASE -->
<div class="screen" id="screen-kb" style="display:block">
  <div class="kb-overlay" id="kb-overlay" onclick="closeSidebar()"></div>
  <div class="mobile-nav-bar">
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Models
    </button>
    <button class="mobile-search-btn" onclick="openMobileSearch()">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
  </div>
  <div class="kb-layout">
    <nav class="kb-sidebar">
      <div class="kb-sidebar-header">
        <div class="kb-sidebar-title" style="margin-bottom:10px">Kia Lineup 2026–27</div>
        <div class="kb-tab-row">
          <button id="kb-tab-models" class="kb-tab-btn active" onclick="switchKbTab('models')">Models</button>
          <button id="kb-tab-search" class="kb-tab-btn" onclick="switchKbTab('search')">Search</button>
        </div>
      </div>
      <div id="kb-models-list">
      <div class="kb-cat">Sedans</div>
      <button class="kb-model-btn" onclick="showModel('k4',this)"><div><div class="kb-model-name">K4</div><div class="kb-model-sub">Compact Sedan / Hatchback</div></div></button>
      <button class="kb-model-btn" onclick="showModel('k5',this)"><div><div class="kb-model-name">K5</div><div class="kb-model-sub">Mid-Size Sedan</div></div></button>
      <div class="kb-cat">Small SUVs</div>
      <button class="kb-model-btn" onclick="showModel('seltos',this)"><div><div class="kb-model-name">Seltos</div><div class="kb-model-sub">Subcompact SUV</div></div></button>
      <button class="kb-model-btn" onclick="showModel('niro',this)"><div><div class="kb-model-name">Niro</div><div class="kb-model-sub">Hybrid / PHEV / EV</div></div></button>
      <div class="kb-cat">Mid-Size SUVs</div>
      <button class="kb-model-btn" onclick="showModel('sportage',this)"><div><div class="kb-model-name">Sportage</div><div class="kb-model-sub">Compact SUV</div></div></button>
      <button class="kb-model-btn" onclick="showModel('sorento',this)"><div><div class="kb-model-name">Sorento</div><div class="kb-model-sub">Mid-Size / 3-Row SUV</div></div></button>

}

  {id:'seltos27',name:'2027 Kia Seltos',year:2027,type:['suv-small','hybrid'],tagline:'All-new redesign — first-ever Seltos hybrid, Telluride-inspired exterior',msrp:25500,msrp_top:33000,features:['tech','wireless','safety','awd','heated','sunroof'],mpg:'38 mpg hybrid',seats:5,awd:true,thirdrow:false,isNew:true,whatsnew:'Complete redesign. Telluride-inspired exterior. First Seltos hybrid at ~$30K. 360-cam, memory seat standard.',coach:{budget:'Hybrid adds ~$5K but reduces fuel costs significantly.',features:'Standard panoramic sunroof, 360-cam, memory seat.',space:'Grew bigger — more rear legroom and cargo than outgoing model.',fuel:'38 mpg hybrid — class-leading for a small SUV.',style:'Dramatic new design — looks like a mini Telluride.',reliability:'Brand-new platform, full warranty.'}},
  {id:'niro',name:'2026 Kia Niro',year:2026,type:['suv-small','hybrid','electric'],tagline:'Efficiency champion — hybrid, PHEV, or full EV in one nameplate',msrp:28550,msrp_top:40000,features:['tech','wireless','safety','heated','charging'],mpg:'53 mpg hybrid',seats:5,awd:false,thirdrow:false,isNew:false,whatsnew:'Hybrid, PHEV, or full EV. Updated infotainment. This may be last generation before EV3 transition.',coach:{budget:'Hybrid pays for itself quickly in fuel savings.',features:'Solid tech suite and safety package.',space:'Hatchback cargo access is versatile. Good for 2-4.',fuel:'53 mpg combined — best non-EV in the Kia lineup.',style:'Unique hatchback-crossover styling.',reliability:'Proven hybrid system. Full Kia warranty.'}},
  {id:'sportage',name:'2026 Kia Sportage',year:2026,type:['suv-mid','hybrid'],tagline:'Edmunds top-rated compact SUV — 12.3" screen on every single trim',msrp:30290,msrp_top:42500,features:['tech','wireless','safety','heated','awd','leather','sunroof'],mpg:'26 mpg / 39 mpg hybrid',seats:5,awd:true,thirdrow:false,isNew:false,whatsnew:'12.3" dual screen now standard on ALL trims. New gear-tooth grille. Standard adaptive cruise and parking sensors.',coach:{budget:'EX trim is the sweet spot — solid spec for a modest step up.',features:'12.3" screen everywhere. Bose and HUD on upper trims.',space:'Best-in-class cargo with dual-level floor.',fuel:'Hybrid gets a genuine 39 mpg.',style:'One of the sharpest compact SUVs on the market.',reliability:'Edmunds top pick. 10-year warranty.'}},
  {id:'sorento',name:'2026 Kia Sorento',year:2026,type:['suv-mid','suv-3row','hybrid'],tagline:'Best-value 3-row family SUV — 37 mpg hybrid, 5,000 lb tow',msrp:33635,msrp_top:48000,features:['tech','wireless','safety','leather','heated','awd','3row','cargo','towing'],mpg:'26 mpg / 37 mpg hybrid',seats:7,awd:true,thirdrow:true,isNew:false,whatsnew:'Updated driver-assist. Hybrid available at 37 mpg. PHEV available. 5,000 lb tow rating.',coach:{budget:'Best-value 3-row on the market. Starts well below Telluride.',features:'Available panoramic sunroof, Bose, HUD, ventilated seats.',space:'87 cu ft max cargo. Real 3rd row adults can use.',fuel:'37 mpg hybrid — best for a 3-row SUV.',style:'Clean, upscale exterior. Looks more expensive than it is.',reliability:'KBB #4 Best 3-Row. 10-year / 100K.'}},
  {id:'telluride',name:'2027 Kia Telluride',year:2027,type:['suv-3row'],tagline:'Completely redesigned — bigger, bolder, and now available as a hybrid',msrp:40735,msrp_top:57285,features:['tech','wireless','safety','leather','heated','awd','3row','cargo','towing','ventilated','sound','hud'],mpg:'21 mpg / hybrid coming',seats:8,awd:true,thirdrow:true,isNew:true,whatsnew:'Skipped 2026 for a complete redesign. Larger, boxier. Adults fit all 3 rows. New hybrid. X-Pro off-road trim.',coach:{budget:'If budget is tight, Sorento gives similar capability for $7K+ less.',features:'Fully loaded: 5-zone climate, Bose, HUD, panoramic sunroof.',space:'Biggest Kia made. Third row fits adults.',fuel:'Gas 21 mpg. Hybrid version significantly better.',style:'Bold, boxy new design — commands presence.',reliability:"KBB's best 3-row SUV. 10-year warranty."}},
  {id:'carnival',name:'2026 Kia Carnival',year:2026,type:['minivan'],tagline:"The SUV-styled minivan — VIP cabin, 8 passengers, hybrid available",msrp:37500,msrp_top:51000,features:['tech','wireless','safety','leather','heated','3row','cargo','sound'],mpg:'22 mpg / hybrid available',seats:8,awd:false,thirdrow:true,isNew:false,whatsnew:'Hybrid variant now available. VIP Lounge seats. Best cargo room in class. 4 USB-C standard on upper trims.',coach:{budget:'No SUV at this price gives more space per dollar.',features:'VIP lounge seats, dual sunroofs, Bose, 4-zone climate available.',space:'Unmatched — 145 cu ft max cargo. Sliding doors.',fuel:'Hybrid adds meaningful efficiency.',style:"Looks like an SUV — the stigma doesn't apply here.",reliability:'Best warranty in class. 10-year / 100K.'}},
  {id:'ev6',name:'2026 Kia EV6',year:2026,type:['electric','suv-small'],tagline:'Award-winning electric crossover — 800V fast charge, 310+ mile range',msrp:42900,msrp_top:58000,features:['tech','wireless','safety','leather','heated','ventilated','sound','awd','charging'],mpg:'310+ mi range (RWD)',seats:5,awd:true,thirdrow:false,isNew:false,whatsnew:'NACS port added — charges at Tesla Superchargers. 310+ mile range. V2L powers external devices.',coach:{budget:'Higher upfront cost offset by dramatically lower running costs. EV credits may apply.',features:'800V: 18 min 10-80% at 350kW charger. V2L powers job sites.',space:'Sporty proportions — ideal for 4 passengers.',fuel:'~$30/month electricity vs $150+ gas equivalent.',style:'World Car Design of the Year.',reliability:'World Car of the Year. Full warranty + EV battery coverage.'}},
  {id:'ev9',name:'2026 Kia EV9',year:2026,type:['electric','suv-3row'],tagline:'Premium 3-row electric SUV — 304-mile range, 576hp GT, V2L home power',msrp:56545,msrp_top:78000,features:['tech','wireless','safety','leather','heated','ventilated','3row','cargo','awd','charging','sound','hud'],mpg:'295-304 mi range',seats:7,awd:true,thirdrow:true,isNew:false,whatsnew:'GT variant: 576hp, 0-60 in 4.3s. 800V charging. V2L home-power up to 3.6kW. Nightfall Edition.',coach:{budget:'EV credit may reduce by $7,500. Zero gas costs.',features:'Everything Kia offers — 5-zone climate, Bose, HUD.',space:'More interior space than most gas 3-row SUVs. Adults fit 3rd row.',fuel:'$0 gas. 295-304 mile range.',style:'Turns more heads than luxury brands at the same price.',reliability:"KBB #2 Best Electric SUV. Full EV battery warranty."}}
];

const FEAT={awd:'AWD',tech:'Large Touchscreen',wireless:'Wireless CarPlay',safety:'Driver Assist',leather:'Premium Interior',heated:'Heated Seats',ventilated:'Ventilated Seats',sound:'Premium Sound',hud:'HUD',cargo:'Max Cargo','3row':'3rd Row',towing:'Towing',charging:'EV Charging',sunroof:'Sunroof',offroad:'Off-Road'};
const PRIL={budget:'Budget / Payment',features:'Features & Tech',space:'Space',fuel:'Fuel Efficiency',style:'Style',reliability:'Reliability'};

function updateCredit(v){
  document.getElementById('credit-val').textContent=v;
  const t={1:'Challenged',2:'Challenged',3:'Rebuilding',4:'Fair',5:'Good',6:'Very Good',7:'Excellent',8:'Excellent'};
  const bg={1:'#ffe3e3',2:'#ffe3e3',3:'#fff3cd',4:'#fff3cd',5:'#fff3cd',6:'#d4edda',7:'#d4edda',8:'#d4edda'};
  const tc={1:'#721c24',2:'#721c24',3:'#856404',4:'#856404',5:'#856404',6:'#155724',7:'#155724',8:'#155724'};
  const el=document.getElementById('credit-tier');
  el.textContent=t[v];el.style.background=bg[v];el.style.color=tc[v];S.credit=parseInt(v);
}
function toggleChoice(el,g){
  el.classList.toggle('sel');
  const arr=g==='type'?S.types:S.uses;
  const v=el.dataset.val,i=arr.indexOf(v);
  if(i>-1)arr.splice(i,1);else arr.push(v);
}
function single(el){
  document.querySelectorAll('#pass-grid .choice-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');S.passengers=el.dataset.val;
}
function toggleTag(el,g){
  el.classList.toggle('sel');
  const arr=g==='must'?S.mustHave:g==='nice'?S.niceToHave:S.canGiveUp;
  const v=el.dataset.val,i=arr.indexOf(v);
  if(i>-1)arr.splice(i,1);else arr.push(v);
}
function selectPri(el){
  const val=el.dataset.val,i=S.priorities.indexOf(val);
  if(i>-1){
    S.priorities.splice(i,1);el.classList.remove('sel');
    el.querySelector('.pr-rank').textContent='—';
    S.priorities.forEach((p,idx)=>{
      const c=document.querySelector('#priority-list [data-val="'+p+'"]');
      if(c)c.querySelector('.pr-rank').textContent=idx+1;
    });
  } else if(S.priorities.length<3){
    S.priorities.push(val);el.classList.add('sel');
    el.querySelector('.pr-rank').textContent=S.priorities.length;
  }
}
function collectAll(){
  S.fname=document.getElementById('c-fname').value;
  S.lname=document.getElementById('c-lname').value;
  S.phone=document.getElementById('c-phone').value;
  S.email=document.getElementById('c-email').value;
  S.address=document.getElementById('c-address').value;
  S.credit=parseInt(document.getElementById('credit-slider').value);
  S.cvYear=document.getElementById('cv-year').value;
  S.cvMake=document.getElementById('cv-make').value;
  S.cvModel=document.getElementById('cv-model').value;
  S.cvMiles=document.getElementById('cv-miles').value;
  S.cvLike=document.getElementById('cv-like').value;
  S.cvHate=document.getElementById('cv-hate').value;
  for(let i=0;i<=4;i++){const e=document.getElementById('notes-'+i);if(e)S.notes[i]=e.value;}
}
function goNext(){
  collectAll();
  if(S.step<4){
    document.getElementById('step-'+S.step).classList.remove('active');
    S.step++;
    document.getElementById('step-'+S.step).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
    updateNav();
    if(S.step===4)buildResults();
  } else {
    collectAll();buildSummary();
    document.querySelectorAll('#screen-guest .step-panel').forEach(p=>p.style.display='none');
    document.getElementById('summary-section').style.display='block';
        document.querySelector('.progress-wrap').style.display='none';
    document.getElementById('hdr-right').textContent='Summary';
  }
}
function goBack(){
  if(S.step>0){
    document.getElementById('step-'+S.step).classList.remove('active');
    S.step--;
    document.getElementById('step-'+S.step).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
    updateNav();
  }
}
function updateNav(){
  document.getElementById('btn-back').style.visibility=S.step===0?'hidden':'visible';
  document.getElementById('btn-next').textContent=S.step===4?'View Summary →':'Continue →';
  document.getElementById('nav-step-info').textContent='Step '+(S.step+1)+' of 5';
  document.getElementById('hdr-right').textContent='Step '+(S.step+1)+' of 5';
  for(let i=0;i<5;i++){
    const ps=document.getElementById('ps'+i);
    ps.className='progress-step';
    if(i<S.step)ps.classList.add('done');
    else if(i===S.step)ps.classList.add('active');
  }
}
function scoreV(v){
  let s=0;
  const types=S.types.includes('opentoall')||!S.types.length?['suv-small','suv-mid','suv-3row','sedan','hatchback','minivan','electric','hybrid']:S.types;
  if(!types.some(t=>v.type.includes(t)))return -999;
  for(const m of S.mustHave){if(m==='awd'&&!v.awd)return -999;if(m==='3row'&&!v.thirdrow)return -999;if(m==='charging'&&!v.features.includes('charging'))return -999;}
  if(S.passengers==='5+'&&v.seats<6)s-=25;
  [...S.mustHave,...S.niceToHave].forEach(f=>{if(v.features.includes(f))s+=12;});
  S.mustHave.forEach(f=>{if(v.features.includes(f))s+=15;});
  if(S.priorities.includes('budget')||S.priorities[0]==='budget'){if(v.msrp<30000)s+=22;else if(v.msrp<42000)s+=10;}
  if(S.priorities.includes('fuel')&&(v.type.includes('hybrid')||v.type.includes('electric')))s+=22;
  if(S.priorities.includes('space')&&v.thirdrow)s+=18;
  if(S.priorities.includes('reliability'))s+=10;
  if(v.isNew)s+=5;
  if(S.credit<=3&&v.msrp>40000)s-=20;
  if(S.credit<=5&&v.msrp>55000)s-=30;
  return s;
}
function buildResults(){
  const scored=VEHICLES.map(v=>({...v,score:scoreV(v)})).filter(v=>v.score>-999).sort((a,b)=>b.score-a.score).slice(0,3);
  const area=document.getElementById('results-area');
  const wants=[...S.mustHave,...S.niceToHave];
  const top1=S.priorities[0]||'features';
  const budgetFocus=S.priorities.includes('budget');
  if(!scored.length){area.innerHTML='<div class="card"><p style="color:var(--muted)">No exact match — let\'s review selections together.</p></div>';return;}
  area.innerHTML=scored.map((v,i)=>{
    const isTop=i===0;
    const ck=budgetFocus?'budget':(top1 in v.coach?top1:'features');
    let giveupNote='';
    if(budgetFocus&&S.canGiveUp.length){
      const gl={leather:'leather interior',sunroof:'the sunroof',awd:'AWD',sound:'premium sound',hud:'the HUD',ventilated:'ventilated seats',tech:'the larger screen',heated:'heated steering wheel',color:'color preference'};
      giveupNote=' Since you mentioned you could live without <em>'+S.canGiveUp.map(g=>gl[g]||g).join(', ')+'</em>, we have room to work with.';
    }
    return `<div class="result-card ${isTop?'top':''}">
      <div class="result-badge ${isTop?'top':'alt'}">${isTop?' Best Match':i===1?'▲ Strong Alternative':'● Also Consider'}</div>
      <div class="result-name">${v.name}${v.isNew?'<span class="new-badge">NEW</span>':''}</div>
      <div class="result-tagline">${v.tagline}</div>
      <div class="pill-row">${v.features.map(f=>`<span class="pill ${wants.includes(f)?'match':''}">${FEAT[f]||f}</span>`).join('')}<span class="pill">${v.mpg}</span><span class="pill">${v.seats} seats</span>${v.awd?'<span class="pill match">AWD Avail</span>':''}</div>
      <div class="info-box"><strong>What's new:</strong> ${v.whatsnew}</div>
      ${v.coach[ck]?`<div class="coach-box"><strong>${PRIL[ck]||ck}:</strong> ${v.coach[ck]}${giveupNote}</div>`:''}
    </div>`;
  }).join('');
}
function buildSummary(){
  const scored=VEHICLES.map(v=>({...v,score:scoreV(v)})).filter(v=>v.score>-999).sort((a,b)=>b.score-a.score).slice(0,3);
  const ct={1:'Challenged(1)',2:'Challenged(2)',3:'Rebuilding(3)',4:'Fair(4)',5:'Good(5)',6:'Very Good(6)',7:'Excellent(7)',8:'Excellent(8)'};
  const now=new Date();
  const ds=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  const ts=now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const fn=[S.fname,S.lname].filter(Boolean).join(' ')||'Guest';
  let h=`<div class="sum-header"><div><div class="sum-brand"><span>KIA</span> Needs Analysis</div><div style="font-size:13px;color:var(--muted);margin-top:4px">Vehicle Finder — Customer Worksheet</div></div><div class="sum-date"><div style="font-size:15px;font-weight:600">${ds}</div><div>${ts}</div></div></div>`;
  h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px"><div>`;
  h+=`<div class="sum-section"><div class="sum-section-title">Client Information</div>`;
  h+=`<div class="sum-row"><span class="key">Name</span><span class="val">${fn}</span></div>`;
  if(S.phone)h+=`<div class="sum-row"><span class="key">Phone</span><span class="val">${S.phone}</span></div>`;
  if(S.email)h+=`<div class="sum-row"><span class="key">Email</span><span class="val">${S.email}</span></div>`;
  if(S.address)h+=`<div class="sum-row"><span class="key">Address</span><span class="val">${S.address}</span></div>`;
  h+=`<div class="sum-row"><span class="key">Credit Band</span><span class="val">${ct[S.credit]||S.credit}</span></div></div>`;
  h+=`<div class="sum-section"><div class="sum-section-title">Current Vehicle</div>`;
  if(S.cvYear||S.cvMake||S.cvModel)h+=`<div class="sum-row"><span class="key">Vehicle</span><span class="val">${[S.cvYear,S.cvMake,S.cvModel].filter(Boolean).join(' ')}</span></div>`;
  if(S.cvMiles)h+=`<div class="sum-row"><span class="key">Mileage</span><span class="val">${S.cvMiles}</span></div>`;
  if(S.cvLike)h+=`<div class="sum-row"><span class="key">Likes</span><span class="val">${S.cvLike}</span></div>`;
  if(S.cvHate)h+=`<div class="sum-row"><span class="key">Leaving behind</span><span class="val">${S.cvHate}</span></div>`;
  h+=`</div></div><div><div class="sum-section"><div class="sum-section-title">Vehicle Preferences</div>`;
  if(S.types.length)h+=`<div class="sum-row"><span class="key">Type</span><span class="val">${S.types.join(', ')}</span></div>`;
  if(S.passengers)h+=`<div class="sum-row"><span class="key">Passengers</span><span class="val">${S.passengers}</span></div>`;
  if(S.mustHave.length)h+=`<div class="sum-row"><span class="key">Must have</span><span class="val">${S.mustHave.map(f=>FEAT[f]||f).join(', ')}</span></div>`;
  if(S.niceToHave.length)h+=`<div class="sum-row"><span class="key">Nice to have</span><span class="val">${S.niceToHave.map(f=>FEAT[f]||f).join(', ')}</span></div>`;
  if(S.priorities.length)h+=`<div class="sum-row"><span class="key">Top priorities</span><span class="val">${S.priorities.map((p,i)=>`${i+1}. ${PRIL[p]||p}`).join('<br>')}</span></div>`;
  h+=`</div></div></div>`;
  h+=`<div class="sum-section"><div class="sum-section-title">Recommended Vehicles</div>`;
  scored.forEach((v,i)=>{
    const badge=i===0?' Best Match':i===1?'▲ Alternative':'● Also Consider';
    h+=`<div style="display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0"><div style="font-size:11px;font-weight:700;color:${i===0?'var(--red)':'var(--muted)'};min-width:90px;padding-top:2px">${badge}</div><div><div class="sum-match-name">${v.name}</div><div class="sum-match-sub">${v.tagline}</div></div></div>`;
  });

function showModel(id, btn){
  document.querySelectorAll('.kb-model-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('kb-welcome').style.display='none';
  const d=KB[id];
  if(!d)return;
  const newBadge=d.isNew?'<span class="new-tag">All New</span>':"";
  let tabsHtml=d.trims.map((t,i)=>`<button class="trim-tab${i===0?' active':''}" onclick="switchTrim(${i})">${t.name}</button>`).join('');
  let trimsHtml=d.trims.map((t,i)=>`
    <div class="trim-content${i===0?' active':''}" id="tc-${i}">
      <div class="trim-top">
        <div class="trim-name-big">${t.name}</div>
        <div class="trim-tagline">${t.tag}</div>
        <div class="trim-price">Starting at ${t.price}</div>
      </div>
      <div class="trim-grid">
        <div class="trim-card">
          <div class="trim-card-title">Selling Points</div>
          <ul class="selling-points">${t.pts.map(p=>{
            const isNew=p.startsWith('NEW:');
            const text=isNew?p.slice(4).trim():p;
            const tl=text.toLowerCase();
            const isLeather=tl.includes('leather')||tl.includes('leatherette')||tl.includes('nappa');
            const isSunroof=tl.includes('sunroof')||tl.includes('panoramic');
            const isHEV=tl.includes('hybrid')&&!tl.includes('plug')&&!tl.includes('phev');
            const isPHEV=tl.includes('phev')||tl.includes('plug-in')||tl.includes('plug in');
            const tags=[];
            if(isLeather) tags.push('<span class="feat-tag ft-leather">Leather</span>');
            if(isSunroof) tags.push('<span class="feat-tag ft-sunroof">Sunroof</span>');
            if(isPHEV)    tags.push('<span class="feat-tag ft-phev">PHEV</span>');
            else if(isHEV) tags.push('<span class="feat-tag ft-hev">HEV</span>');
            const tagHtml=tags.join('');
            const liClass=isNew?'upgrade':'';
            if(isNew){
              return '<li class="upgrade">'+(tagHtml?tagHtml+' ':'')+text+'</li>';
            }
            if(tags.length){
              return '<li class="feat-highlight">'+tagHtml+'<span>'+text+'</span></li>';
            }
            return '<li>'+text+'</li>';
          }).join('')}</ul>
        </div>
        <div>
          <div class="trim-card">
            <div class="trim-card-title">MSRP</div>
            <div class="trim-price-big">${t.price}</div>
            <div class="trim-price-note">Starting MSRP before incentives</div>
          </div>
        </div>
      </div>
    </div>`).join('');
  let objHtml=d.objs.map(o=>`<div class="obj-item"><div class="obj-q">"${o.q}"</div><div class="obj-a">${o.a}</div></div>`).join('');
  document.getElementById('kb-model-area').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:8px">
      <div>
        <div class="kb-model-title">${d.name}</div>
        <div style="font-size:14px;color:var(--text-secondary);margin-bottom:14px">${d.tagline}</div>
      </div>
      ${newBadge}
    </div>
    <div class="kb-meta-row">
      <span class="kb-meta-pill hl">${d.badge}</span>
      <span class="kb-meta-pill">From ${d.range.split(' ')[0]}</span>
      <span class="kb-meta-pill">${d.mpg}</span>
      <span class="kb-meta-pill">${d.seats} seats</span>
      ${d.awd?'<span class="kb-meta-pill">AWD Available</span>':''}
    </div>
    <div class="overview-box">${d.overview}</div>
    <div class="model-divider"></div>
    <div style="font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Trim Levels</div>
    <div class="trim-tabs">${tabsHtml}</div>
    ${trimsHtml}
    <div class="objections-section">
      <div class="obj-header">Objection Handling</div>
      ${objHtml}
    </div>`;
  window.scrollTo({top:0});
}

function switchTrim(idx){
  document.querySelectorAll('.trim-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.trim-content').forEach((c,i)=>c.classList.toggle('active',i===idx));
}


// ===== KB TAB SWITCHER =====
function switchKbTab(tab){
  var mb=document.getElementById('kb-tab-models');
  var sb=document.getElementById('kb-tab-search');
  var ml=document.getElementById('kb-models-list');
  var sp=document.getElementById('kb-search-panel');
  var ma=document.getElementById('kb-model-area');
  var sa=document.getElementById('kb-search-area');
  var w=document.getElementById('kb-welcome');
  if(tab==='models'){
    mb.classList.add('active');sb.classList.remove('active');
    ml.style.display='block';sp.style.display='none';sa.style.display='none';
    if(ma.innerHTML.trim()){ma.style.display='block';if(w)w.style.display='none';}
    else{if(w)w.style.display='flex';}
  } else {
    sb.classList.add('active');mb.classList.remove('active');
    ml.style.display='none';sp.style.display='block';
    ma.style.display='none';if(w)w.style.display='none';
    sa.style.display='block';
    if(!sa.innerHTML.trim()){sa.innerHTML='<div class="search-empty"><div class="search-empty-line"></div><div class="search-empty-title">Feature Search</div><p class="search-empty-sub">Type a feature in the search box to find which models and trims include it.<br><br>Try: ventilated &bull; HUD &bull; sunroof &bull; AWD &bull; heated seats &bull; Bose &bull; hybrid &bull; 3 row &bull; nappa &bull; V2L &bull; brembo &bull; massaging</p></div>';}
    setTimeout(function(){var i=document.getElementById('kb-search-input');if(i)i.focus();},80);
  }
}

function runFeatureSearch(){
  var q=(document.getElementById('kb-search-input').value||'').toLowerCase().trim();
  var area=document.getElementById('kb-search-area');
  if(!q||q.length<2){
    area.innerHTML='<div class="search-empty"><div class="search-empty-line"></div><div class="search-empty-title">Feature Search</div><p class="search-empty-sub">Type a feature to find which models and trims include it.<br><br>Try: ventilated &bull; HUD &bull; towing &bull; sunroof &bull; AWD &bull; heated seats &bull; Bose &bull; hybrid &bull; 3 row &bull; nappa &bull; V2L &bull; brembo &bull; massaging</p></div>';
    return;
  }
  var results=FI.filter(function(x){return x.k.indexOf(q)!==-1||x.t.toLowerCase().indexOf(q)!==-1||x.m.toLowerCase().indexOf(q)!==-1||x.n.toLowerCase().indexOf(q)!==-1;});
  if(!results.length){
    area.innerHTML='<div class="search-empty"><div class="search-empty-line"></div><div class="search-empty-title">No Results for &ldquo;'+q+'&rdquo;</div><p class="search-empty-sub">Try: ventilated, AWD, sunroof, towing, HUD, Bose, hybrid, 3 row, heated, leather, nappa, brembo, V2L, massaging</p></div>';
    return;
  }
  var grouped={};
  results.forEach(function(r){if(!grouped[r.m])grouped[r.m]={id:r.id,rows:[]};grouped[r.m].rows.push(r);});
  var mCount=Object.keys(grouped).length;
  var html='<div style="margin-bottom:20px"><div style="font-family:\'Barlow Condensed\',sans-serif;font-size:28px;font-weight:800;color:var(--charcoal);margin-bottom:4px">Results for &ldquo;'+q+'&rdquo;</div><div style="font-size:13px;color:var(--muted)">'+results.length+' trim'+(results.length!==1?'s':'')+' across '+mCount+' model'+(mCount!==1?'s':'')+' include this feature</div></div>';
  Object.keys(grouped).forEach(function(mn){
    var g=grouped[mn];
    html+='<div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)">';
    html+='<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:22px;font-weight:700;color:var(--charcoal)">'+mn+'</div>';
    html+='<button class="search-view-btn" onclick="goToModel(\''+g.id+'\')>View Full Model</button>';
    html+='</div>';
    g.rows.forEach(function(r){
      html+='<div style="display:flex;align-items:flex-start;gap:16px;padding:10px 0;border-bottom:1px solid #f5f5f5">';
      html+='<div style="flex-shrink:0;min-width:150px"><div style="font-size:14px;font-weight:700;color:var(--charcoal)">'+r.t+'</div><div style="font-size:12px;color:var(--red);font-weight:700;margin-top:3px">'+r.p+'</div></div>';
      html+='<div style="font-size:13px;color:var(--mid);line-height:1.6">'+r.n+'</div>';
      html+='</div>';
    });
    html+='</div>';
  });
  area.innerHTML=html;
}

function goToModel(id){
  switchKbTab('models');
  var btns=document.querySelectorAll('.kb-model-btn');
  for(var i=0;i<btns.length;i++){
    var oc=btns[i].getAttribute('onclick')||'';
    if(oc.indexOf("'"+id+"'")!==-1){showModel(id,btns[i]);break;}
  }
}


// ── MOBILE SIDEBAR ──
function toggleSidebar(){
  var s=document.getElementById('kb-sidebar');
  var o=document.getElementById('kb-overlay');
  if(s&&o){s.classList.toggle('open');o.classList.toggle('active');}
}
function closeSidebar(){
  var s=document.getElementById('kb-sidebar');
  var o=document.getElementById('kb-overlay');
  if(s)s.classList.remove('open');
  if(o)o.classList.remove('active');
}
function openMobileSearch(){
  switchKbTab('search');
  var s=document.getElementById('kb-sidebar');
  var o=document.getElementById('kb-overlay');
  if(window.innerWidth<=768&&s&&o){s.classList.add('open');o.classList.add('active');}
}
